<div id="memo-crud-modal" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed inset-0 z-50 flex justify-center items-center p-4 bg-black/40">
  <div class="relative w-full max-w-md max-h-full">
    <div class="relative bg-white rounded-lg shadow-lg border border-gray-200">
      <div class="flex items-center justify-between p-4 md:p-5 border-b border-gray-100 rounded-t-lg">
        <h3 class="text-lg font-semibold text-gray-900">Add memo</h3>
        <button type="button" class="text-gray-400 hover:text-gray-600 rounded-lg text-sm w-8 h-8 inline-flex justify-center items-center" data-modal-toggle="memo-crud-modal" aria-label="Close">
          <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
          </svg>
        </button>
      </div>
      <form method="POST" action="{% url 'add_memo' %}" class="p-4 md:p-5 space-y-4">
        {% csrf_token %}
        {{ memo_form.as_p }}
        <button type="submit" class="btn-primary text-xs w-full">Submit</button>
      </form>
    </div>
  </div>
</div>
