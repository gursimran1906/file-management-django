{% load static %}
{% load compress %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in</title>
  <link rel="icon" type="image/png" href="{% static 'images/logo.png' %}">
  {% compress css %}
  <link rel="stylesheet" href="{% static 'src/output.css' %}">
  {% endcompress %}
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-6">
      <img src="{% static 'images/logo.png' %}" class="h-10 mx-auto mb-4" alt="ANP">
      <h1 class="text-xl font-semibold text-gray-900">Sign in</h1>
      <p class="text-sm text-gray-500 mt-1">File management system</p>
    </div>

    {% if message %}
    <p id="login-flash-success" class="mb-4 rounded-lg border border-green-200 bg-green-50 px-3 py-2 text-sm text-green-800 text-center">{{ message }}</p>
    {% endif %}
    {% if error_message %}
    <p id="login-flash-error" class="mb-4 rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-800 text-center">{{ error_message }}</p>
    {% endif %}

    <div class="div-container">
      <form method="POST" action="{% url 'login' %}" class="space-y-4">
        {% csrf_token %}
        {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
        <div>
          <label class="form-label" for="username">Username</label>
          <input type="text" id="username" name="username" class="form-input" required autocomplete="username">
        </div>
        <div>
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" name="password" class="form-input" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary w-full">Sign in</button>
      </form>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('#login-flash-success, #login-flash-error').forEach((el) => {
        setTimeout(() => {
          el.style.transition = 'opacity 0.25s ease';
          el.style.opacity = '0';
          setTimeout(() => el.remove(), 250);
        }, 10000);
      });
    });
  </script>
</body>
</html>
