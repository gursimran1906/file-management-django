{% load static %}
{% load compress %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="icon" type="image/png" href="{% static 'images/logo.png' %}">
  {% compress css %}
  <link rel="stylesheet" href="{% static 'src/output.css' %}">
  {% endcompress %}
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-6">
      <img src="{% static 'images/logo.png' %}" class="h-10 mx-auto mb-4" alt="ANP">
      <h1 class="text-xl font-semibold text-gray-900">Register</h1>
      <p class="text-sm text-gray-500 mt-1">Create a new account</p>
    </div>

    <div class="div-container">
      <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn-primary w-full" type="submit">Register</button>
      </form>
    </div>
  </div>
</body>
</html>
